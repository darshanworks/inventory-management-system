<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Suppliers</title>
  </head>

  <body class="bg-gray-100">
    <div id="navbar"></div>
    <div class="p-8">
      <h1 class="text-4xl font-bold mb-6">Suppliers</h1>

      <!-- Add Supplier -->
      <div class="bg-white p-6 rounded shadow mb-8">
        <h2 class="text-2xl font-bold mb-4">Add Supplier</h2>

        <form id="supplierForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input
            type="text"
            id="name"
            placeholder="Supplier Name"
            class="w-full p-2 border rounded"
            required
          />

          <input
            type="text"
            id="phone"
            placeholder="Phone"
            class="w-full p-2 border rounded"
            required
          />

          <input
            type="email"
            id="email"
            placeholder="Email"
            class="w-full p-2 border rounded"
            required
          />

          <input
            type="text"
            id="address"
            placeholder="Address"
            class="w-full p-2 border rounded"
            required
          />

          <button type="submit" class="bg-black text-white p-3 rounded">
            Add Supplier
          </button>
        </form>
      </div>

      <!-- Supplier List -->
      <div
        id="supplierList"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      ></div>
    </div>
    <div
      id="toast"
      class="fixed top-5 right-5 hidden px-6 py-3 rounded text-white shadow-lg z-50"
    ></div>
    <script src="./js/toast.js"></script>
    <script src="./js/config.js"></script>

    <script src="./js/suppliers.js"></script>
    <script src="./js/navbar.js"></script>
  </body>
</html>
