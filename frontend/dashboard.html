<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Dashboard</title>
  </head>

  <body class="bg-gray-100">
    <div id="navbar"></div>
    <div class="p-8">
      <h1 class="text-4xl font-bold mb-8">Dashboard</h1>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-10">
        <div class="bg-white p-6 rounded shadow">
          <h2 class="text-xl font-bold mb-2">Products</h2>

          <p id="totalProducts" class="text-4xl font-bold">0</p>
        </div>

        <div class="bg-white p-6 rounded shadow">
          <h2 class="text-xl font-bold mb-2">Suppliers</h2>

          <p id="totalSuppliers" class="text-4xl font-bold">0</p>
        </div>

        <div class="bg-white p-6 rounded shadow">
          <h2 class="text-xl font-bold mb-2">Transactions</h2>

          <p id="totalTransactions" class="text-4xl font-bold">0</p>
        </div>

        <div class="bg-white p-6 rounded shadow">
          <h2 class="text-xl font-bold mb-2 text-red-500">Low Stock</h2>

          <p id="lowStockCount" class="text-4xl font-bold text-red-500">0</p>
        </div>

        <div class="bg-white p-6 rounded shadow">
          <h2 class="text-xl font-bold mb-2">Inventory Value</h2>

          <p id="inventoryValue" class="text-4xl font-bold text-green-600">
            ₹0
          </p>
        </div>
      </div>

      <!-- Low Stock Products -->
      <div class="bg-white p-6 rounded shadow mb-10">
        <h2 class="text-2xl font-bold mb-4">Low Stock Products</h2>

        <div id="lowStockProducts"></div>
      </div>

      <div class="bg-white p-6 rounded shadow mb-8">
        <h2 class="text-2xl font-bold mb-4">Inventory Quantity Chart</h2>

        <canvas id="inventoryChart"></canvas>
      </div>
      <div class="bg-white p-6 rounded shadow mb-8">
        <h2 class="text-2xl font-bold mb-4">Transaction Analysis</h2>

        <div class="h-80">
          <canvas id="transactionChart"></canvas>
        </div>
      </div>
      <!-- Recent Transactions -->
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-2xl font-bold mb-4">Recent Transactions</h2>

        <div id="recentTransactions"></div>
      </div>
    </div>

    <div
      id="toast"
      class="fixed top-5 right-5 hidden px-6 py-3 rounded text-white shadow-lg z-50"
    ></div>
    <script src="./js/toast.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/dashboard.js"></script>

    <script src="./js/navbar.js"></script>
  </body>
</html>
